<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 2026 — Alle Tipps</title>
<style>
  :root {
    --bg: #1a1a2e; --card: #16213e; --accent: #ffd700;
    --text: #eee; --muted: #888; --win: #4caf50; --draw: #ff9800; --loss: #f44336;
    --blue: #2196f3; --detail-bg: #0f1729;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
         max-width: 420px; margin: 0 auto; padding: 12px; }
  header { text-align: center; padding: 20px 0 4px; }
  header h1 { color: var(--accent); font-size: 1.4rem; letter-spacing: .04em; }

  .back-link { display: block; text-align: center; font-size: 0.78rem; color: var(--muted);
               text-decoration: none; margin: 6px 0 16px; letter-spacing: .02em; }
  .back-link:hover { color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; gap: 1px; margin-bottom: 16px; background: #111;
          border-radius: 10px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 11px 8px; font-size: 0.82rem; font-weight: 600;
             background: var(--card); border: none; color: var(--muted); cursor: pointer;
             transition: background 120ms, color 120ms; }
  .tab-btn.active { background: var(--accent); color: #1a1a2e; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Section headers */
  .section-header { border-left: 3px solid var(--accent); padding-left: 10px;
                    margin: 20px 0 12px; }
  .section-header h2 { font-size: 0.78rem; font-weight: 700; color: var(--accent);
                       text-transform: uppercase; letter-spacing: .08em; }
  .section-header p  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .section-empty { font-size: 0.85rem; color: var(--muted); text-align: center;
                   padding: 20px 0; }

  /* Cards */
  .card { background: var(--card); border-radius: 12px; padding: 14px 16px;
          margin-bottom: 14px; cursor: pointer; transition: filter 120ms; }
  .card:active { filter: brightness(1.12); }
  .card-meta { font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
               letter-spacing: .04em; margin-bottom: 8px; display: flex;
               align-items: center; gap: 6px; flex-wrap: wrap; }
  .teams { display: flex; align-items: center; justify-content: space-between;
           font-size: 1.05rem; font-weight: 600; margin-bottom: 10px; }
  .vs { color: var(--muted); font-size: 0.8rem; }
  .card-divider { border: none; border-top: 1px solid #2a2a4a; margin: 8px 0; }
  .prob-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .bar-a    { background: var(--win); }
  .bar-draw { background: var(--draw); }
  .bar-b    { background: var(--loss); }
  .prob-row { display: flex; gap: 8px; font-size: 0.8rem; margin-bottom: 4px; }
  .prob-a    { color: var(--win); }
  .prob-draw { color: var(--draw); }
  .prob-b    { color: var(--loss); }
  .prob-sep  { color: var(--muted); }
  .form-row, .injuries-row { font-size: 0.82rem; margin-top: 6px; color: var(--muted); }
  .highlight { color: var(--text); }
  .dot-W { color: var(--win); }
  .dot-D { color: var(--draw); }
  .dot-L { color: var(--loss); }

  /* Pending: tip row */
  .main-tip-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
  .main-tip-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .main-tip-score { font-size: 1.7rem; font-weight: 800; color: var(--accent); letter-spacing: .02em; line-height: 1; }
  .main-tip-meta  { font-size: 0.72rem; color: var(--muted); }
  .tip-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .tip-label { font-size: 0.75rem; color: var(--muted); }
  .tip-value { font-size: 0.9rem; font-weight: 600; color: var(--text); }
  .tip-alt   { font-size: 0.85rem; font-weight: 500; color: var(--muted); }
  .tip-prob  { font-size: 0.68rem; color: var(--muted); }
  .tip-sep   { color: var(--muted); font-size: 0.7rem; }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px;
           font-size: 0.7rem; font-weight: 700; letter-spacing: .03em; }
  .badge-high   { background: #1b5e20; color: #a5d6a7; }
  .badge-medium { background: #e65100; color: #ffcc80; }
  .badge-low    { background: #4a1010; color: #ef9a9a; }

  /* Completed card */
  .result-big { text-align: center; font-size: 2rem; font-weight: 800;
                color: var(--text); margin: 6px 0 4px; letter-spacing: .04em; }
  .result-tip-row { text-align: center; font-size: 0.82rem; color: var(--muted);
                    margin-bottom: 8px; display: flex; align-items: center;
                    justify-content: center; gap: 8px; }
  .badge-exact      { background: #5a4000; color: var(--accent); }
  .badge-difference { background: #0d2a5c; color: #90caf9; }
  .badge-tendency   { background: #1b4020; color: #a5d6a7; }
  .badge-wrong      { background: #4a1010; color: #ef9a9a; }

  /* Stats block */
  .stats-block { background: var(--card); border-radius: 12px; padding: 14px 16px;
                 margin-bottom: 14px; }
  .stats-bar-track { display: flex; height: 8px; border-radius: 4px; overflow: hidden;
                     margin-bottom: 10px; }
  .stats-seg-exact { background: var(--accent); }
  .stats-seg-diff  { background: var(--blue); }
  .stats-seg-tend  { background: var(--win); }
  .stats-seg-wrong { background: var(--loss); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
  .stats-cell { font-size: 0.82rem; }
  .stats-num  { font-weight: 700; font-size: 1rem; margin-right: 4px; }
  .col-exact  { color: var(--accent); }
  .col-diff   { color: var(--blue); }
  .col-tend   { color: var(--win); }
  .col-wrong  { color: var(--loss); }

  footer { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 20px 0; }
  #loading { text-align: center; color: var(--muted); padding: 40px; }

  /* Detail Modal */
  #detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  #detail-overlay.open { display: flex; }
  #detail-panel {
    background: var(--detail-bg); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 420px;
    max-height: 88vh; overflow-y: auto;
    padding: 20px 16px 32px;
    transform: translateY(100%);
    transition: transform 280ms cubic-bezier(.32,.72,0,1);
  }
  #detail-panel.open { transform: translateY(0); }
  .detail-drag { width: 36px; height: 4px; background: #444; border-radius: 2px;
                 margin: 0 auto 16px; }
  .detail-close { position: absolute; top: 14px; right: 14px; background: none; border: none;
                  color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
                  border-radius: 6px; line-height: 1; }
  .detail-close:hover { color: var(--text); background: rgba(255,255,255,0.07); }
  #detail-panel { position: relative; }
  .detail-teams { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .detail-meta  { font-size: 0.78rem; color: var(--muted); text-align: center;
                  text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .detail-section { border-left: 3px solid var(--accent); padding-left: 10px;
                    margin: 16px 0 10px; }
  .detail-section h3 { font-size: 0.72rem; font-weight: 700; color: var(--accent);
                       text-transform: uppercase; letter-spacing: .08em; }
  .score-row { display: grid; grid-template-columns: 36px 1fr 52px 1fr auto;
               align-items: center; gap: 6px; padding: 5px 6px; border-radius: 6px;
               margin-bottom: 4px; }
  .score-val  { font-size: 0.95rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-bar-track { height: 6px; background: #2a2a4a; border-radius: 3px; overflow: hidden; }
  .score-bar-fill  { height: 100%; border-radius: 3px; transition: width .3s; }
  .score-pct  { font-size: 0.78rem; color: var(--muted); text-align: right; }
  .score-lbl  { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
  .score-bm   { font-size: 0.68rem; color: var(--accent); background: #3a2f00;
                padding: 1px 5px; border-radius: 8px; white-space: nowrap; }
  .score-row-w { background: rgba(76,175,80,.08); }
  .score-row-d { background: rgba(255,152,0,.08); }
  .score-row-l { background: rgba(244,67,54,.08); }
  .factor-row { display: grid; grid-template-columns: 1fr 44px 80px 44px;
                align-items: center; gap: 6px; margin-bottom: 8px; }
  .factor-label { font-size: 0.75rem; color: var(--muted); }
  .factor-val   { font-size: 0.8rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .factor-val-a { color: var(--win); text-align: right; }
  .factor-val-b { color: var(--loss); }
  .factor-bar   { height: 8px; border-radius: 4px; overflow: hidden;
                  background: #2a2a4a; display: flex; }
  .factor-bar-a { background: var(--win); }
  .factor-bar-b { background: var(--loss); }
  .tip-derivation { font-size: 0.78rem; color: var(--muted); text-align: center;
                    padding: 2px 0 8px; }
  .tip-derivation strong { color: var(--text); }
</style>
</head>
<body>
<header>
  <h1>⚽ WM 2026 Tipps</h1>
</header>
<a href="index.html" class="back-link">← Zurück zur Übersicht</a>

<div class="tabs">
  <button class="tab-btn active" data-tab="past">Vergangene Tipps</button>
  <button class="tab-btn" data-tab="future">Alle Vorhersagen</button>
</div>

<div id="loading">⏳ Lade…</div>
<div id="app" style="display:none">
  <div id="tab-past" class="tab-content active"></div>
  <div id="tab-future" class="tab-content"></div>
</div>
<footer id="footer"></footer>

<!-- Detail Modal -->
<div id="detail-overlay" role="presentation">
  <div id="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detail-content">
    <div class="detail-drag"></div>
    <button class="detail-close" onclick="closeDetail()" aria-label="Schließen">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
  // ── Broadcast-day helpers (06:00 local boundary) ─────────────────────────
  const _SIX_H = 6 * 60 * 60 * 1000;
  function broadcastDateOf(dt) { return new Date(dt.getTime() - _SIX_H).toLocaleDateString("en-CA"); }
  function todayBroadcast()     { return broadcastDateOf(new Date()); }
  function yesterdayBroadcast() { const s=new Date(Date.now()-_SIX_H); s.setDate(s.getDate()-1); return s.toLocaleDateString("en-CA"); }
  function tomorrowBroadcast()  { const s=new Date(Date.now()-_SIX_H); s.setDate(s.getDate()+1); return s.toLocaleDateString("en-CA"); }
  function pendingBroadcastDate(m) { return m.kickoff_utc ? broadcastDateOf(new Date(m.kickoff_utc)) : m.date; }
  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // ── Format helpers ────────────────────────────────────────────────────────
  function fmtDate(s) {
    const months=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
    const d=new Date(s+"T12:00:00");
    return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
  }
  function fmtDateTime(kickoff_utc, date) {
    if (kickoff_utc) {
      const d=new Date(kickoff_utc);
      const bDay=broadcastDateOf(d);
      const td=todayBroadcast(), tm=tomorrowBroadcast();
      const dateLabel=bDay===td?"Heute":bDay===tm?"Morgen":fmtDate(bDay);
      const time=d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
      return `${dateLabel}, ${time} Uhr`;
    }
    return fmtDate(date);
  }
  function fmtPhase(p) {
    return {"group":"Gruppenphase","round_of_32":"Sechzehntelfinale","round_of_16":"Achtelfinale",
            "quarter_final":"Viertelfinale","semi_final":"Halbfinale","final":"Finale",
            "third_place":"Spiel um Platz 3"}[p]||p;
  }
  function groupLabel(bd) {
    const td=todayBroadcast(), tm=tomorrowBroadcast();
    if (bd===td) return "Heute";
    if (bd===tm) return "Morgen";
    return fmtDate(bd);
  }
  function formDots(arr) {
    if (!arr||!arr.length) return '<span style="color:var(--muted)">–</span>';
    return arr.map(r=>r==="W"?'<span class="dot-W">●</span>':
                      r==="D"?'<span class="dot-D">◑</span>':
                              '<span class="dot-L">○</span>').join(" ");
  }
  function confidenceBadge(level) {
    const map={high:["badge-high","Sicher"],medium:["badge-medium","Knapp"],low:["badge-low","Unsicher"]};
    const [cls,label]=map[level]||map.medium;
    return `<span class="badge ${cls}">${label}</span>`;
  }
  function accuracyBadge(acc) {
    const map={correct_result:["badge badge-exact","Exakt"],
               correct_difference:["badge badge-difference","Differenz ✓"],
               correct_tendency:["badge badge-tendency","Tendenz ✓"],
               wrong:["badge badge-wrong","Daneben"]};
    const [cls,label]=map[acc]||map.wrong;
    return `<span class="${cls}">${label}</span>`;
  }

  // ── Card renderers ────────────────────────────────────────────────────────
  function renderPending(m) {
    const grp=m.group?`GRUPPE ${esc(m.group)}`:fmtPhase(m.phase).toUpperCase();
    const bA=(m.prob_a||0).toFixed(0),bD=(m.prob_draw||0).toFixed(0),bB=(m.prob_b||0).toFixed(0);
    const hasInj=(m.injuries_a&&m.injuries_a.length)||(m.injuries_b&&m.injuries_b.length);
    const top3=(m.top_results||[]).slice(0,3);
    const tipsHtml=top3.map((t,i)=>
      `<span class="${i===0?"tip-value":"tip-alt"}">${esc(t[0])}</span><span class="tip-prob">${t[1].toFixed(1)}%</span>`
    ).join('<span class="tip-sep">·</span>');
    const ef=m.explanation_factors||{};
    const tordiff=(ef.tip_lambda_a!=null&&ef.tip_lambda_b!=null)?(ef.tip_lambda_a-ef.tip_lambda_b):null;
    const tordiffLabel=tordiff!=null?`Tordiff: ${tordiff>=0?"+":""}${tordiff.toFixed(1)}`:"";
    const mainTipHtml=`<div class="main-tip-row">
  <span class="main-tip-label">Unser Tipp</span>
  <span class="main-tip-score">${esc(m.tip||"?")}</span>
  ${tordiffLabel?`<span class="main-tip-meta">${tordiffLabel}</span>`:""}
</div>`;
    return `<div class="card" data-mid="${esc(m.match_id)}">
  <div class="card-meta">${grp} &nbsp;•&nbsp; ${fmtDateTime(m.kickoff_utc,m.date)} ${confidenceBadge(m.confidence_level||"medium")}</div>
  <div class="teams">
    <span>${esc(m.flag_a||"")} ${esc(m.team_a)}</span>
    <span class="vs">vs</span>
    <span>${esc(m.team_b)} ${esc(m.flag_b||"")}</span>
  </div>
  <hr class="card-divider"/>
  ${mainTipHtml}
  <div class="tip-row"><span class="tip-label">Wahrschl.:</span>${tipsHtml}</div>
  <div class="prob-bar">
    <div class="bar-a" style="width:${bA}%"></div>
    <div class="bar-draw" style="width:${bD}%"></div>
    <div class="bar-b" style="width:${bB}%"></div>
  </div>
  <div class="prob-row">
    <span class="prob-a">S ${(m.prob_a||0).toFixed(1)}%</span>
    <span class="prob-sep">•</span>
    <span class="prob-draw">U ${(m.prob_draw||0).toFixed(1)}%</span>
    <span class="prob-sep">•</span>
    <span class="prob-b">N ${(m.prob_b||0).toFixed(1)}%</span>
  </div>
  <hr class="card-divider"/>
  <div class="form-row">🔥 Form: ${esc(m.team_a)} ${formDots(m.form_a)} &nbsp; ${esc(m.team_b)} ${formDots(m.form_b)}</div>
  ${hasInj?`<div class="injuries-row">🚑 <span class="highlight">${esc(m.team_a)}: ${(m.injuries_a||[]).map(esc).join(", ")||"–"}</span> | ${esc(m.team_b)}: ${(m.injuries_b||[]).map(esc).join(", ")||"–"}</div>`:""}
</div>`;
  }
  function renderCompleted(m) {
    const grp=m.group?`GRUPPE ${esc(m.group)}`:fmtPhase(m.phase).toUpperCase();
    const pa=m.prob_a!=null?m.prob_a.toFixed(0):"0";
    const pd=m.prob_draw!=null?m.prob_draw.toFixed(0):"0";
    const pb=m.prob_b!=null?m.prob_b.toFixed(0):"0";
    const hasProbs=m.prob_a!=null;
    return `<div class="card">
  <div class="card-meta">${grp} &nbsp;•&nbsp; ${fmtDate(m.date)}</div>
  <div class="teams">
    <span>${esc(m.flag_a||"")} ${esc(m.team_a)}</span><span class="vs">vs</span><span>${esc(m.team_b)} ${esc(m.flag_b||"")}</span>
  </div>
  <hr class="card-divider"/>
  <div class="result-big">${esc(m.result||"–")}</div>
  <div class="result-tip-row"><span>Tipp war: <strong>${esc(m.tip||"?")}</strong></span>${accuracyBadge(m.accuracy)}</div>
  ${hasProbs?`<div class="prob-bar">
    <div class="bar-a" style="width:${pa}%"></div>
    <div class="bar-draw" style="width:${pd}%"></div>
    <div class="bar-b" style="width:${pb}%"></div>
  </div>
  <div class="prob-row">
    <span class="prob-a">S ${(m.prob_a||0).toFixed(1)}%</span><span class="prob-sep">•</span>
    <span class="prob-draw">U ${(m.prob_draw||0).toFixed(1)}%</span><span class="prob-sep">•</span>
    <span class="prob-b">N ${(m.prob_b||0).toFixed(1)}%</span>
  </div>`:""}
</div>`;
  }
  function renderStats(stats) {
    if(!stats||stats.played===0) return "";
    const w=v=>stats.played>0?(v/stats.played*100).toFixed(1)+"%":"0%";
    return `<div class="stats-block">
  <div class="stats-bar-track">
    <div class="stats-seg-exact" style="width:${w(stats.correct_result)}"></div>
    <div class="stats-seg-diff"  style="width:${w(stats.correct_difference)}"></div>
    <div class="stats-seg-tend"  style="width:${w(stats.correct_tendency)}"></div>
    <div class="stats-seg-wrong" style="width:${w(stats.wrong)}"></div>
  </div>
  <div class="stats-grid">
    <div class="stats-cell col-exact"><span class="stats-num">${stats.correct_result}</span>🏆 Exakt</div>
    <div class="stats-cell col-diff"><span class="stats-num">${stats.correct_difference}</span>📏 Differenz</div>
    <div class="stats-cell col-tend"><span class="stats-num">${stats.correct_tendency}</span>↗ Tendenz</div>
    <div class="stats-cell col-wrong"><span class="stats-num">${stats.wrong}</span>✗ Daneben</div>
  </div>
</div>`;
  }
  function sectionHeader(title, subtitle) {
    return `<div class="section-header"><h2>${title}</h2>${subtitle?`<p>${subtitle}</p>`:""}</div>`;
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.addEventListener("click", () => {
      const name = b.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(x => x.classList.toggle("active", x.dataset.tab === name));
      document.querySelectorAll(".tab-content").forEach(x => x.classList.toggle("active", x.id === "tab-" + name));
    });
  });

  // ── Detail Modal ──────────────────────────────────────────────────────────
  let allMatches = {};

  function splitBar(a, b, invertForLower) {
    const fa=parseFloat(a), fb=parseFloat(b);
    if(isNaN(fa)||isNaN(fb)||fa+fb===0) return [50,50];
    if(invertForLower) return [fb/(fa+fb)*100, fa/(fa+fb)*100];
    return [fa/(fa+fb)*100, fb/(fa+fb)*100];
  }
  function factorRow(label, valA, valB, invertForLower) {
    const [pA,pB]=splitBar(valA,valB,invertForLower);
    const dispA=valA!=null?valA:"–"; const dispB=valB!=null?valB:"–";
    return `<div class="factor-row">
  <span class="factor-label">${label}</span>
  <span class="factor-val factor-val-a">${dispA}</span>
  <div class="factor-bar">
    <div class="factor-bar-a" style="width:${pA.toFixed(1)}%"></div>
    <div class="factor-bar-b" style="width:${pB.toFixed(1)}%"></div>
  </div>
  <span class="factor-val factor-val-b">${dispB}</span>
</div>`;
  }
  function renderDetail(m) {
    const ef=m.explanation_factors||{}; const so=m.score_odds||{};
    const grp=m.group?`Gruppe ${esc(m.group)}`:fmtPhase(m.phase);
    const top5=(m.top_results||[]).slice(0,5);
    const maxProb=top5.length?top5[0][1]:1;
    const scoreRows=top5.map(t=>{
      const [ga,gb]=t[0].split(":").map(Number);
      const type=ga>gb?"w":ga<gb?"l":"d";
      const color=type==="w"?"var(--win)":type==="d"?"var(--draw)":"var(--loss)";
      const lbl=type==="w"?esc(m.team_a)+" gewinnt":type==="l"?esc(m.team_b)+" gewinnt":"Unentschieden";
      const barW=maxProb>0?(t[1]/maxProb*100).toFixed(0):0;
      const bm=so[t[0]];
      const bmHtml=bm?`<span class="score-bm">BM ${bm}%</span>`:`<span></span>`;
      return `<div class="score-row score-row-${type}">
  <span class="score-val" style="color:${color}">${t[0]}</span>
  <div class="score-bar-track"><div class="score-bar-fill" style="width:${barW}%;background:${color}"></div></div>
  <span class="score-pct">${t[1].toFixed(1)}%</span>
  <span class="score-lbl">${lbl}</span>
  ${bmHtml}
</div>`;
    }).join("");
    // Tipp-Zusammensetzung (dual-lambda section)
    let tipCompositionHtml='';
    if(ef.tip_lambda_a!=null&&ef.prob_lambda_a!=null){
      const rawDiff=ef.tip_lambda_a-ef.tip_lambda_b;
      const sign=rawDiff>=0?'+':'';
      const lambdaLabel=ef.over_2_5!=null?'λ Tipp (D=0.3, O/U kalibriert)':'λ Tipp (D=0.3, ×1.8)';
      const ouLine=ef.over_2_5!=null
        ?`<div class="tip-derivation">📊 O/U 2.5: ${ef.over_2_5}% über | Erw. Gesamt: ${ef.ou_total!=null?ef.ou_total.toFixed(1):"–"} Tore</div>`
        :'';
      tipCompositionHtml=`
<div class="detail-section"><h3>Tipp-Zusammensetzung</h3></div>
${factorRow("λ Modell (D=0.8)", ef.prob_lambda_a.toFixed(2), ef.prob_lambda_b.toFixed(2))}
${factorRow(lambdaLabel, ef.tip_lambda_a.toFixed(2), ef.tip_lambda_b.toFixed(2))}
${ouLine}
<div class="tip-derivation">Erw. Tordiff: <strong>${sign}${rawDiff.toFixed(1)}</strong> → Tipp: <strong style="color:var(--accent)">${esc(m.tip||"?")}</strong></div>`;
    }
    const h2h=ef.h2h_score!=null?ef.h2h_score:null;
    const h2hA=h2h!=null?(h2h*100).toFixed(0)+"%":"–";
    const h2hB=h2h!=null?((1-h2h)*100).toFixed(0)+"%":"–";
    return `
<div class="detail-teams">${esc(m.flag_a||"")} ${esc(m.team_a)} <span style="color:var(--muted);font-weight:400">vs</span> ${esc(m.team_b)} ${esc(m.flag_b||"")}</div>
<div class="detail-meta">${grp} &nbsp;•&nbsp; ${fmtDateTime(m.kickoff_utc, m.date)}</div>
<div class="detail-section"><h3>Top 5 Ergebnisse</h3></div>
${scoreRows}
${tipCompositionHtml}
<div class="detail-section"><h3>Modell-Faktoren</h3></div>
${factorRow("Tendenz-Quoten", ef.odds_prob_a!=null?ef.odds_prob_a+"%":null, ef.odds_prob_b!=null?ef.odds_prob_b+"%":null)}
${factorRow("ELO-Rating", ef.elo_a, ef.elo_b)}
${factorRow("Kopf an Kopf", h2hA!=="–"?h2hA:null, h2hB!=="–"?h2hB:null)}
${factorRow("Klement-Score", m.klement_a, m.klement_b)}
${factorRow("Angriff (Poisson)", ef.attack_a, ef.attack_b)}
${factorRow("Abwehr (Poisson)", ef.defense_a, ef.defense_b, true)}
${factorRow("Form-Anpassung", ef.live_adj_a, ef.live_adj_b)}`;
  }
  function openDetail(m) {
    if(!m) return;
    document.getElementById("detail-content").innerHTML=renderDetail(m);
    const overlay=document.getElementById("detail-overlay");
    const panel=document.getElementById("detail-panel");
    overlay.classList.add("open");
    requestAnimationFrame(()=>requestAnimationFrame(()=>panel.classList.add("open")));
    panel.scrollTop=0;
  }
  function closeDetail() {
    const panel=document.getElementById("detail-panel");
    const overlay=document.getElementById("detail-overlay");
    panel.classList.remove("open");
    setTimeout(()=>overlay.classList.remove("open"),290);
  }
  document.getElementById("detail-overlay").addEventListener("click", e=>{
    if(e.target===document.getElementById("detail-overlay")) closeDetail();
  });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeDetail(); });
  document.addEventListener("click", e=>{
    const card=e.target.closest(".card[data-mid]");
    if(card) openDetail(allMatches[card.dataset.mid]);
  });

  // ── Main ─────────────────────────────────────────────────────────────────
  async function init() {
    try {
      const r=await fetch("predictions.json?_="+Date.now());
      if(!r.ok) throw new Error("HTTP "+r.status);
      const data=await r.json();
      document.getElementById("loading").style.display="none";
      document.getElementById("app").style.display="block";

      const pending=data.pending_matches||[];
      const completed=data.completed_matches||[];
      pending.forEach(m=>{ allMatches[m.match_id]=m; });

      // ── Tab 1: Vergangene Tipps ──────────────────────────────────────────
      let pastHtml="";
      if(data.stats && data.stats.played>0) {
        pastHtml += sectionHeader("GENAUIGKEIT", `${data.stats.played} Spiel${data.stats.played!==1?"e":""} gespielt`);
        pastHtml += renderStats(data.stats);
      }
      if(completed.length) {
        // Group by date descending (newest first)
        const dateMap=new Map();
        for(const m of completed) {
          if(!dateMap.has(m.date)) dateMap.set(m.date,[]);
          dateMap.get(m.date).push(m);
        }
        const sortedDates=[...dateMap.keys()].sort().reverse();
        for(const d of sortedDates) {
          pastHtml += sectionHeader(fmtDate(d));
          pastHtml += dateMap.get(d).map(renderCompleted).join("");
        }
      } else {
        pastHtml += `<p class="section-empty">Noch keine Spiele gespielt</p>`;
      }
      document.getElementById("tab-past").innerHTML=pastHtml;

      // ── Tab 2: Alle Vorhersagen ──────────────────────────────────────────
      let futureHtml="";
      if(pending.length) {
        // Group by broadcast date ascending
        const bdMap=new Map();
        for(const m of pending) {
          const bd=pendingBroadcastDate(m);
          if(!bdMap.has(bd)) bdMap.set(bd,[]);
          bdMap.get(bd).push(m);
        }
        const sortedBDs=[...bdMap.keys()].sort();
        for(const bd of sortedBDs) {
          const matches=bdMap.get(bd);
          futureHtml += sectionHeader(groupLabel(bd), `${matches.length} Spiel${matches.length!==1?"e":""}`);
          futureHtml += matches.map(renderPending).join("");
        }
      } else {
        futureHtml=`<p class="section-empty">Keine ausstehenden Spiele</p>`;
      }
      document.getElementById("tab-future").innerHTML=futureHtml;

      if(data.updated_at) {
        const ts=new Date(data.updated_at);
        document.getElementById("footer").textContent=
          "Letzte Aktualisierung: "+ts.toLocaleDateString("de-DE")+" "+
          ts.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
      }
    } catch(e) {
      document.getElementById("loading").textContent="⚠️ Fehler beim Laden.";
    }
  }
  init();
</script>
</body>
</html>
