name: Recalculate after injury update

on:
  push:
    paths:
      - 'data/injuries.json'

jobs:
  recalculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Rebuild predictions
        run: python src/update_predictions.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit & push
        run: |
          git config user.name "wm-predictor-bot"
          git config user.email "bot@wm-predictor"
          git add docs/predictions.json
          git diff --staged --quiet || git commit -m "Injury update: $(date +'%d.%m %H:%M')"
          git push
