name: Update after matchday

on:
  schedule:
    - cron: '15 17 * * *'
    - cron: '15 20 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Fetch results
        run: python src/fetch_results.py
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      - name: Rebuild predictions
        run: python src/update_predictions.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit & push
        run: |
          git config user.name "wm-predictor-bot"
          git config user.email "bot@wm-predictor"
          git add docs/predictions.json data/fixtures.json data/form_cache.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%d.%m %H:%M')"
          git push
